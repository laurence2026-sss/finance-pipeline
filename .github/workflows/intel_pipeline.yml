name: 🌐 Global Intelligence Pipeline

on:
  schedule:
    - cron: '0 */2 * * *'  # 2시간 주기로 실행
  workflow_dispatch:      # 수동 실행도 가능

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: |
          pip install feedparser requests python-dotenv yfinance groq beautifulsoup4 lxml

      - name: 🚀 파이프라인 실행
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd intelligence_pipeline
          python pipeline.py

      - name: 💾 데이터 커밋 (data 브랜치)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto: Pipeline 실행 결과 업데이트"
          file_pattern: "intelligence_pipeline/data/*.json"
          branch: main
